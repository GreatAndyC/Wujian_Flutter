name: icheck
description: "物见 - 家庭物品识别与整理应用。"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  excel: ^4.0.6
  flutter_secure_storage: ^9.2.4
  image: ^4.3.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  pdf: ^3.11.1
  share_plus: ^11.0.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/simhei.ttf
